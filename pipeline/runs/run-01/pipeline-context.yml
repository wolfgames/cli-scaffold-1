    file: src/game/screens/GameScreen.tsx
    position: bottom
    height-px: 32
    css: "absolute bottom-8 left-1/2 -translate-x-1/2"
    note: "Logo image ~24px + bottom-8 (32px) margin; total reserved bottom ~64px"
  - element: PauseOverlay
    file: src/game/screens/GameScreen.tsx
    position: overlay
    height-px: 0
    css: "fixed inset-0 (only shown when paused)"
    note: "Full-screen overlay; shown on pause only; does not reserve viewport space"

