    fun_test_failed_features: []
    difficulty_mismatch:
      - "L5_to_L6: too_hard — spare orbs drop from 4 to 1 when purple 2HP eggs introduced; GDD promises gradual ramp"
    theme_drift: []
    cos_still_failing: []
  notes: >
    5 cross-batch bugs found and fixed inline:
    (1) config.ts wired scaffold generic LoadingScreen/ResultsScreen instead of Mars Bounce themed ones — all three themed screens now registered.
    (2) config.ts used scaffold lazy-import StartScreen (green #BCE083 background, 'Start Screen' DOM stub) instead of MarsBounceStartScreen.
    (3) gameController had no observer on boardState won/lost — win/loss sequences were never fired and results screen never navigated to. Fixed: ECS boardState observer added; playWinSequence / playLossSequence imported and wired with sequenceFired guard.
    (4) ResultsScreen lostBoard() heuristic was score() === 0 — unreliable (player scores during a losing run). Fixed: uses stars() === 0 instead.
    (5) NEXT LEVEL progression bug: ECS DB always init at level 1, overwriting gameState.level() signal on every game mount. Fixed: seed ECS level from gameState.level() before bridgeEcsToSignals.
    Carry-forward (not fixed inline): intro cutscene unreachable (ScreenId is closed enum); L5→L6 difficulty spike.

