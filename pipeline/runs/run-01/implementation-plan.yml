      Skip button always visible (top-right, 44×44pt). After skip/complete: routes to title screen.
      In-game: peg-hit SFX, egg-pop SFX, crystal-collect SFX, win fanfare, loss tone all play.
      Audio unlocked on first Play tap. Music loops during gameplay.
    features: [intro-cutscene, audio-system]
    cos_covered: []
    ux_zones:
      thumb_zone: [out-of-reach]
      touch_targets: [skip-button]
      feedback_surfaces: [illustrated-panels, caption-text, audio-channel]
    acceptance:
