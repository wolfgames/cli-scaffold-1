      - "acceptance[] tests go red then green"
      - "integration call site exists at files.integration (EntityRenderer calls entityAnimations on collision events)"
      - "CoS sub-walk clean for cos_covered: animated-dynamics, canvas"
      - "all destroy paths call gsap.killTweensOf first (guardrail compliance)"
      - "particle count <= 80 concurrent (performance guardrail)"
      - "bun run build + bun run test pass within 3 fix cycles"

  # ────────────────────────────────────────────────────────────────────────────
  # BATCH 6 — P1 — Win/Loss Sequences + Results Screen
  # ────────────────────────────────────────────────────────────────────────────
  - id: 6
    name: "Win/loss sequences, results screen with star rating and score counter"
    priority: P1
    player_visible: >
      Win: gold flash → 'Level Clear!' slide-in (300ms back.out) → stars stagger in (250ms each,
      elastic.out) → score ticks up (500ms) → NEXT LEVEL button fades in + fanfare SFX.
      Loss: 'So close!' fade-in → TRY AGAIN button → ad-offer button (1s delay).
      Results screen shows star rating, final score, correct buttons.
    features: [win-loss-sequences, results-screen, continue-ad-system]
    cos_covered: [animated-dynamics, scoring, canvas]
    ux_zones:
      thumb_zone: [center]
      touch_targets: [next-level-button, try-again-button, ad-offer-button]
      feedback_surfaces: [star-rating, score-counter, win-overlay, loss-overlay]
    acceptance:
      - given: "board enters won state"
        should: "winSequence fires: gold flash (100ms) → 'Level Clear!' slide-in (300ms) → stars staggered (250ms each) → score tick-up (500ms) → NEXT LEVEL fade-in (200ms)"
      - given: "board enters lost state"
        should: "lossSequence fires: 'So close!' fade-in (300ms) → egg-count shown → TRY AGAIN fade-in (200ms) → ad-offer fade-in after 1s delay"
      - given: "win sequence completes"
        should: "navigation to results screen fires; results screen shows starsEarned (1-3), final score, NEXT LEVEL button"
      - given: "loss sequence completes"
        should: "navigation to results screen fires; results screen shows 0 stars (or no stars), TRY AGAIN button, ad-offer button"
      - given: "WATCH AD button tapped on results screen"
        should: "AdProvider.requestAd() called (stub); on completion orbsRemaining += 3; game resumes same level"
      - given: "ad-offer button shown on results screen"
        should: "button is lower on screen than TRY AGAIN button; only shown on loss, not win"
    test_loci:
      - describe: "winSequence — animation order and navigation"
        file: "tests/game/marsbounce/sequences/sequences.test.ts"
        cases:
          - "board enters won state"
          - "win sequence completes"
      - describe: "lossSequence — animation order and navigation"
        file: "tests/game/marsbounce/sequences/sequences.test.ts"
        cases:
          - "board enters lost state"
          - "loss sequence completes"
      - describe: "ResultsScreen — star rating, buttons, ad placement"
        file: "tests/game/marsbounce/screens/ResultsScreen.test.ts"
        cases:
          - "WATCH AD button tapped on results screen"
          - "ad-offer button shown on results screen"
    files:
      sequences:
        - src/game/marsbounce/sequences/winSequence.ts
        - src/game/marsbounce/sequences/lossSequence.ts
      screens:
        - src/game/marsbounce/screens/ResultsScreen.tsx
      state:
        - src/game/marsbounce/state/MarsBouncePlugin.ts
      integration:
        - src/game/marsbounce/screens/gameController.ts
      test:
        - tests/game/marsbounce/sequences/sequences.test.ts
        - tests/game/marsbounce/screens/ResultsScreen.test.ts
    how:
      - "winSequence.ts / lossSequence.ts: GSAP timelines (no requestAnimationFrame); sequences are promises that resolve when complete before navigate()"
      - "ResultsScreen.tsx: SolidJS component reading starsEarned/score signals bridged from ECS; reuse star-rating primitive from src/modules/primitives/star-rating/"
      - "Ad offer: AdProvider interface with requestAd() method; stub implementation returns Promise.resolve() immediately; button visible but labelled 'Watch Ad (Unavailable)' in stub mode"
      - "Ad-offer button: rendered below TRY AGAIN in DOM order; z-index same level; 1s GSAP delayedCall for fade-in"
    risk: MEDIUM
    risk_reason: >
      Sequence timing must match GDD exactly or feel off. Navigation fires after sequence completes —
      if sequence promise never resolves, player is stuck. Verify: mock GSAP timelines in tests to
      confirm onComplete callbacks fire.
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at files.integration (gameController wires boardState won/lost to sequences)"
      - "CoS sub-walk clean for cos_covered: animated-dynamics, scoring, canvas"
      - "NEXT LEVEL and TRY AGAIN buttons >= 44×44 px; ad-offer button lower on screen"
      - "ad-offer only shown on loss, not win"
      - "bun run build + bun run test pass within 3 fix cycles"

  # ────────────────────────────────────────────────────────────────────────────
  # BATCH 7 — P1 — Screen Identity: Loading, Title, Pause, Chapter Interstitial
  # ────────────────────────────────────────────────────────────────────────────
  - id: 7
    name: "Screen identity — loading screen, title screen, pause overlay, chapter interstitial"
    priority: P1
    player_visible: >
      Loading screen: Martian landscape silhouette + 'Mars Bounce' wordmark + animated progress bar.
      Title screen: animated Mars surface background, PLAY button (center, large), settings icon (top-right).
      Pause overlay: Mars-themed styling, RESUME and QUIT buttons (44×44pt min).
      Chapter interstitial: chapter name, brief description, CONTINUE button; auto-skipped unless zone boundary crossed.
    features: [loading-screen, title-screen, pause-overlay, chapter-interstitial]
    cos_covered: [canvas]
    ux_zones:
      thumb_zone: [center]
      touch_targets: [play-button, settings-icon, resume-button, quit-button, continue-button, pause-button]
      feedback_surfaces: [progress-bar, wordmark, background-animation, logo, overlay-panel, chapter-name]
    acceptance:
      - given: "game loads for the first time"
        should: "LoadingScreen shows Martian silhouette background, Mars Bounce wordmark, animated progress bar"
      - given: "first-time player: first-time flag is true"
        should: "LoadingScreen routes to IntroCutsceneScreen after load completes"
      - given: "returning player: first-time flag is false"
        should: "LoadingScreen routes directly to StartScreen (no cutscene)"
      - given: "StartScreen renders"
        should: "PLAY button is centered, large (>= 44×44px), in natural thumb zone; settings icon top-right (stretching zone)"
      - given: "pause button tapped in-game"
        should: "PauseOverlay shows with Mars theming; RESUME and QUIT buttons each >= 44×44 px"
      - given: "QUIT tapped in pause overlay"
        should: "navigates to title screen (not loss state); level progress preserved for resume"
      - given: "player crosses zone boundary (every ZONE_SIZE=10 levels)"
        should: "ChapterInterstitialScreen shown with new chapter name and description"
    test_loci:
      - describe: "LoadingScreen — routing logic"
        file: "tests/game/marsbounce/screens/LoadingScreen.test.ts"
        cases:
          - "first-time player: first-time flag is true"
          - "returning player: first-time flag is false"
      - describe: "StartScreen — layout and PLAY button"
        file: "tests/game/marsbounce/screens/StartScreen.test.ts"
        cases:
          - "StartScreen renders"
      - describe: "PauseOverlay — QUIT navigation"
        file: "tests/game/marsbounce/screens/PauseOverlay.test.ts"
        cases:
          - "pause button tapped in-game"
          - "QUIT tapped in pause overlay"
      - describe: "ChapterInterstitialScreen — zone boundary trigger"
        file: "tests/game/marsbounce/screens/ChapterInterstitialScreen.test.ts"
        cases:
          - "player crosses zone boundary (every ZONE_SIZE=10 levels)"
    files:
      screens:
        - src/game/marsbounce/screens/LoadingScreen.tsx
        - src/game/marsbounce/screens/StartScreen.tsx
        - src/game/marsbounce/screens/startView.ts
        - src/game/marsbounce/screens/ChapterInterstitialScreen.tsx
        - src/core/ui/PauseOverlay.tsx
      integration:
        - src/game/marsbounce/screens/GameScreen.tsx
      test:
        - tests/game/marsbounce/screens/LoadingScreen.test.ts
        - tests/game/marsbounce/screens/StartScreen.test.ts
        - tests/game/marsbounce/screens/PauseOverlay.test.ts
        - tests/game/marsbounce/screens/ChapterInterstitialScreen.test.ts
    how:
      - "LoadingScreen.tsx: replace green background with dark Mars gradient; add emoji Martian silhouette (🏔️ row), wordmark text, GSAP animated progress bar width tween; wire first-time flag routing"
      - "StartScreen.tsx: Mars surface background (CSS gradient or preloaded image); game logo text styled; PLAY button centered (large, min 44px); settings icon top-right; unlockAudio() called on PLAY tap"
      - "PauseOverlay.tsx: minimal theming change (background color, border style) via CSS props; RESUME primary, QUIT secondary; 44px min targets; QUIT routes to title"
      - "ChapterInterstitialScreen.tsx: new SolidJS screen; shows chapter name/description/background; CONTINUE button centered 44px; auto-advances if no zone boundary (skip silently)"
      - "Note: src/core/ui/PauseOverlay.tsx is read-only scaffold — minimize changes; use CSS theming via class props only"
    risk: MEDIUM
    risk_reason: >
      PauseOverlay.tsx is in src/core/ (read-only per project-structure rule). Only CSS/prop theming allowed.
      If Mars theme requires structural change, extract a wrapper in src/game/marsbounce/screens/.
      Verify: first-time routing logic in LoadingScreen tested with mocked localStorage flag.
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at files.integration (GameScreen wires pause button; LoadingScreen routes correctly)"
      - "CoS sub-walk clean for cos_covered: canvas"
      - "PLAY, RESUME, QUIT, CONTINUE buttons all >= 44×44 px"
      - "PauseOverlay.tsx modifications limited to CSS/props only (no structural changes to src/core/)"
      - "unlockAudio() called on first PLAY tap (mobile audio requirement)"
      - "bun run build + bun run test pass within 3 fix cycles"

  # ────────────────────────────────────────────────────────────────────────────
