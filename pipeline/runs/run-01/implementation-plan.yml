  - id: 1
    name: "Foundation — ECS plugin, physics engine, game controller init"
    priority: P0
    player_visible: >
      Player sees the GPU canvas initialized with a placeholder board (emoji pegs and eggs arranged on
      a black starfield), the HUD showing orb count and score at top, and the WolfGames logo at bottom.
      The game is running in Pixi mode — not the DOM stub.
    features: [game-state-ecs, physics-engine, game-screen-shell, asset-manifest, hud-display]
    cos_covered: [scoring, animated-dynamics, core-interaction, canvas]
    ux_zones:
      thumb_zone: [center]
      touch_targets: [launcher-handle, pause-button]
      feedback_surfaces: [gpu-canvas, hud-orb-count, hud-score, hud-level]
    acceptance:
      # game-state-ecs
      - given: "game controller initializes with a level config"
        should: "ECS DB created with score=0, orbsRemaining=orbsTotal, boardState=loaded; setActiveDb called"
      - given: "ECS transaction addScore(100) fires"
        should: "db.resources.score equals 100 and bridgeEcsToSignals propagates to SolidJS signal"
      # physics-engine
      - given: "orb launched at 45 degrees with initial velocity"
        should: "orbPhysics.step() returns updated position with gravity applied (y increases each tick)"
      - given: "orb traveling toward a wall"
        should: "collisionDetection.reflectWall() returns velocity with correct angle of incidence = angle of reflection"
      # game-screen-shell
      - given: "GameScreen.tsx mounts"
        should: "Pixi Application initializes, canvas appended to container, HUD visible with orb count and score"
      - given: "controller.destroy() called"
        should: "Pixi app destroyed; ECS bridge cleaned up; setActiveDb(null) called; no JS errors"
      # asset-manifest
      - given: "game boots"
        should: "asset manifest contains scene-sprites-marsbounce, fx-particles-marsbounce, audio-sfx-marsbounce, audio-music-marsbounce, data-levels-marsbounce bundles"
    test_loci:
      - describe: "MarsBouncePlugin — ECS state"
        file: "tests/game/marsbounce/state/MarsBouncePlugin.test.ts"
        cases:
          - "ECS DB created with score=0, orbsRemaining=orbsTotal, boardState=loaded; setActiveDb called"
          - "ECS transaction addScore(100) fires"
      - describe: "orbPhysics — step and collision"
        file: "tests/game/marsbounce/physics/orbPhysics.test.ts"
        cases:
          - "orb launched at 45 degrees with initial velocity"
          - "orb traveling toward a wall"
      - describe: "GameController — init and destroy"
        file: "tests/game/marsbounce/GameController.test.ts"
        cases:
          - "GameScreen.tsx mounts"
          - "controller.destroy() called"
    files:
      state:
        - src/game/marsbounce/state/MarsBouncePlugin.ts
        - src/game/marsbounce/state/bridgeEcsToSignals.ts
        - src/game/marsbounce/asset-manifest.ts
      physics:
        - src/game/marsbounce/physics/orbPhysics.ts
        - src/game/marsbounce/physics/collisionDetection.ts
      integration:
        - src/game/marsbounce/screens/gameController.ts
        - src/game/marsbounce/renderers/HudRenderer.ts
        - src/game/marsbounce/index.ts
      test:
        - tests/game/marsbounce/state/MarsBouncePlugin.test.ts
        - tests/game/marsbounce/physics/orbPhysics.test.ts
        - tests/game/marsbounce/GameController.test.ts
    how:
      - "Replace DOM stub gameController.ts with Pixi mode: Application init, ECS DB creation, setActiveDb(db), bridgeEcsToSignals(db), HudRenderer init"
      - "Write MarsBouncePlugin.ts with correct ECS property order (extends→services→components→resources→archetypes→computed→transactions→actions→systems); resources: score, orbsRemaining, orbsTotal, level, zone, boardState, starsEarned"
      - "Implement orbPhysics.ts as pure function module (no Pixi imports); gravity 0.3 m/s² equivalent; reflectWall/reflectSphere for collision; deterministic from position+velocity"
      - "Update asset-manifest.ts to add scene-sprites-marsbounce, fx-particles-marsbounce, audio-sfx-marsbounce, audio-music-marsbounce, data-levels-marsbounce bundles with correct prefixes"
      - "HudRenderer.ts: GPU Pixi text nodes for orb count, score, level number, pause button; top 101px budget; pause button 44×44px at top-right"
