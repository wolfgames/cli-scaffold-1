# Source citations:
#   - dom_reserved_bottom: pipeline-context.yml line 66 ("total reserved bottom ~64px")
#   - dom_reserved_top: pipeline-context.yml (reserved_top_px: 0)
#   - hud_top_px: gdd-analysis.yml game-screen-shell notes ("HUD top ~12% of viewport")
#   - launcher_bottom_px: gdd-analysis.yml game-screen-shell notes ("launcher bottom ~15%")
#   - target_height: phase-summary.yml prime.carry_forward.target_device (844px)
viewport_budget:
  default:
    target_device: "390x844 iPhone portrait (dvh)"
    dom_reserved_top: 0
    dom_reserved_bottom: 64
    hud_gpu_px: 101
    launcher_gpu_px: 127
    play_area_px: 552
    total_reserved_px: 292
    total_viewport_px: 844
    play_area_pct: 65.4
    budget_ok: true
    notes: "play area 65.4% > 60% minimum; hud ~12% (101px); launcher ~15% (127px); logo 64px DOM"

resolved_questions:
  - id: OQ-001
    question: "What are the exact star rating thresholds (orbs remaining for 2-star and 3-star)?"
    decision: "1 star = any clear; 2 stars = orbsRemaining >= 40% of orbsTotal; 3 stars = orbsRemaining >= 66% of orbsTotal"
    rationale: "Generous thresholds reward casual players while still motivating efficiency. Configurable in tuning.ts as TWO_STAR_THRESHOLD=0.40, THREE_STAR_THRESHOLD=0.66."

  - id: OQ-002
    question: "What is the levels-per-zone (chapter) count for the PROGRESSION boundary trigger?"
    decision: "ZONE_SIZE = 10 levels. Chapter 1 = levels 1-10 (Hellas Basin), Chapter 2 = 11-20, etc."
    rationale: "GDD specifies 10 hand-crafted levels as the tutorial zone; aligns zone boundary with the end of tutorial progression. Encoded as ZONE_SIZE constant in levelGenerator.ts."

  - id: OQ-003
    question: "Which ad network/SDK is used for the continue (watch-ad-for-3-orbs) system?"
    decision: "Stub implementation. Build the UX shell (button + orb-grant logic). Ad SDK wired via a no-op AdProvider interface, replaced in integration sprint."
    rationale: "No ad network specified. Pipeline delivers the fully functional UX; real ad calls stubbed behind AdProvider abstraction. Prevents blocking the core pass."

  - id: OQ-004
    question: "What is the visual style / art direction for entity sprites (pixel art, vector, painted)?"
    decision: "Emoji/text placeholders for all entities during core pass. Rock peg = 🪨, Alien egg = 🥚 (tinted), Alien planet = 🪐, Energy crystal = 💎, Orb = ⚡. Canvas CoS passes when shapes are distinguishable at 48×48px minimum — met by emoji size. Full sprite atlas deferred to asset pass."
    rationale: "No artist or style guide on file. Emoji placeholders are universally readable, colorblind-safe (color + shape + glyph), and satisfy canvas CoS at mobile resolution. Per plan dispatch: prefer emoji/text > tinted sprite > labeled shape when assets are absent."

preserve_list: []
# Game is fully greenfield — no existing gameplay infrastructure to preserve.
# Scaffold infrastructure (screens, audio skeleton, asset manifest) is adapted/extended, not replaced.

