    cos_covered: [core-interaction, animated-dynamics]
    ux_zones:
      thumb_zone: [center]
      touch_targets: [launcher-handle]
      feedback_surfaces: [trajectory-preview, launcher-sprite, gpu-canvas]
    acceptance:
      # orb-launcher
      - given: "player drags the launcher handle upward"
        should: "aim angle updates in real-time; trajectory dotted line shows first 3-4 reflections"
      - given: "player drags downward"
        should: "drag cancelled silently; no orb fired; no error feedback (per GDD)"
      - given: "player releases with valid upward angle"
        should: "orb fires along computed trajectory; board state transitions idle → aiming → animating"
      - given: "orb is in flight (animating state)"
        should: "further drag input is silently ignored; launcher handle does not respond"
      # trajectory-preview
      - given: "player begins dragging from launcher"
        should: "TrajectoryRenderer draws dotted line updating per-frame; line fades toward end"
      # board-state-machine
      - given: "board is in animating state and orb resolves"
        should: "board transitions to resolving state; then to idle (no eggs cleared) or won/lost"
    test_loci:
      - describe: "LauncherInput — aim and fire"
        file: "tests/game/marsbounce/input/LauncherInput.test.ts"
        cases:
          - "player drags the launcher handle upward"
          - "player drags downward"
          - "player releases with valid upward angle"
          - "orb is in flight (animating state)"
      - describe: "trajectoryPreview — raycasting"
        file: "tests/game/marsbounce/physics/trajectoryPreview.test.ts"
        cases:
          - "player begins dragging from launcher"
      - describe: "boardStateMachine — transitions"
        file: "tests/game/marsbounce/state/boardStateMachine.test.ts"
        cases:
          - "board is in animating state and orb resolves"
    files:
      logic:
        - src/game/marsbounce/physics/trajectoryPreview.ts
        - src/game/marsbounce/state/boardStateMachine.ts
        - src/game/marsbounce/interaction-archetype.md
      renderer:
        - src/game/marsbounce/renderers/LauncherRenderer.ts
        - src/game/marsbounce/renderers/TrajectoryRenderer.ts
      input:
        - src/game/marsbounce/input/LauncherInput.ts
      integration:
        - src/game/marsbounce/screens/gameController.ts
      test:
        - tests/game/marsbounce/input/LauncherInput.test.ts
        - tests/game/marsbounce/physics/trajectoryPreview.test.ts
        - tests/game/marsbounce/state/boardStateMachine.test.ts
    how:
      - "Write interaction-archetype.md documenting drag-aim-release archetype BEFORE coding (core-interaction CoS requirement)"
      - "LauncherInput.ts: listen to pointertap/pointerdown/pointermove/pointerup on stage; compute angle from launcher position to drag point; block input in animating/resolving/won/lost states; downward drag silent cancel"
      - "trajectoryPreview.ts: raycasting simulation from current position+angle using orbPhysics collision; return array of line segments for first 3-4 reflections"
      - "TrajectoryRenderer.ts: GPU Pixi Graphics dotted line drawn from trajectory segments; alpha fade toward end; updates every frame in aiming state"
      - "boardStateMachine.ts: pure state machine (idle→aiming→animating→resolving→won|lost; paused overlay mode); state written to ECS boardState resource"
