  # ────────────────────────────────────────────────────────────────────────────
  # BATCH 4 — P0 — Scoring + Star Rating + Win/Loss Detection
  # ────────────────────────────────────────────────────────────────────────────
  - id: 4
    name: "Scoring system, star rating, win/loss detection"
    priority: P0
    player_visible: >
      Orb hitting an egg: score increments in HUD. Orb bouncing off multiple pegs before hitting egg:
      ricochet bonus shown. All eggs cleared: board transitions to won state. Orbs exhausted with eggs
      remaining: board transitions to lost state. starsEarned computed and bridged to signal.
    features: [scoring-system, star-rating]
    cos_covered: [scoring]
    ux_zones:
      thumb_zone: []
      touch_targets: []
      feedback_surfaces: [hud-score, results-score-counter, star-rating-display]
    acceptance:
      # scoring-system
      - given: "orb hits egg with 1 HP after 2 ricochets"
        should: "score = (1*200) + (Math.pow(1.4,2)*50) + 0 + 0 = 200 + 98 = 298 (before remainingOrbMul)"
      - given: "single shot hits 3+ distinct targets"
        should: "singleShotBonus = 1000 added to shot score"
      - given: "orb collects crystal"
        should: "crystalBonus += 50; score updates in HUD; 1 bonus orb added"
      - given: "level cleared with 4 of 8 orbs remaining (50%)"
        should: "levelScore multiplied by remainingOrbMul = 1 + 4*0.25 = 2.0"
      # star-rating
      - given: "level cleared with 0 orbs remaining"
        should: "starsEarned = 1"
      - given: "level cleared with orbsRemaining >= 40% of orbsTotal"
        should: "starsEarned = 2"
      - given: "level cleared with orbsRemaining >= 66% of orbsTotal"
        should: "starsEarned = 3"
      - given: "starsEarned written to ECS resource"
        should: "bridgeEcsToSignals propagates starsEarned to SolidJS signal for Results screen"
    test_loci:
      - describe: "scoring — multiplicative formula"
        file: "tests/game/marsbounce/state/scoring.test.ts"
        cases:
          - "orb hits egg with 1 HP after 2 ricochets"
          - "single shot hits 3+ distinct targets"
          - "orb collects crystal"
          - "level cleared with 4 of 8 orbs remaining (50%)"
      - describe: "star-rating — threshold logic"
        file: "tests/game/marsbounce/state/scoring.test.ts"
        cases:
          - "level cleared with 0 orbs remaining"
          - "level cleared with orbsRemaining >= 40% of orbsTotal"
          - "level cleared with orbsRemaining >= 66% of orbsTotal"
          - "starsEarned written to ECS resource"
    files:
      state:
        - src/game/marsbounce/state/scoring.ts
      integration:
        - src/game/marsbounce/state/MarsBouncePlugin.ts
      test:
        - tests/game/marsbounce/state/scoring.test.ts
    how:
      - "scoring.ts: pure function computeScore({eggHpDestroyed, ricochetCount, targetsHitThisShot, crystalsCollected, orbsRemaining, orbsTotal}); no Pixi imports"
      - "computeStars({orbsRemaining, orbsTotal, TWO_STAR_THRESHOLD=0.40, THREE_STAR_THRESHOLD=0.66}): returns 1|2|3; thresholds as constants"
      - "Wire scoring.ts into MarsBouncePlugin actions: orbHitsEgg, orbHitsPlanet, orbCollectsCrystal all call addScore transaction; checkWinLose action sets starsEarned and boardState"
    risk: LOW
    risk_reason: "Pure math functions. Verify formula against GDD spec. No Pixi or DOM dependencies."
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at files.integration (MarsBouncePlugin actions call computeScore)"
      - "CoS sub-walk clean for cos_covered: scoring"
      - "score formula matches GDD exactly; star thresholds match OQ-001 decision"
      - "bun run build + bun run test pass within 3 fix cycles"

