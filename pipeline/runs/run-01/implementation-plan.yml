      Orb has swirling energy trail during flight.
    features: [entity-animations]
    cos_covered: [animated-dynamics, canvas]
    ux_zones:
      thumb_zone: []
      touch_targets: []
      feedback_surfaces: [gpu-canvas]
    acceptance:
