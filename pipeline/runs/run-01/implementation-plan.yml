        should: "peg alpha/tint GSAP tween fires (orange glow 300ms); tween killed before peg destruction"
      - given: "AlienEgg with hp=2 hit for first time (hp becomes 1)"
        should: "crack sprite/overlay shown on egg within 100ms of hit; no destroy yet"
      - given: "AlienEgg destroyed (hp reaches 0)"
        should: "egg pop animation 200ms fires; particle burst spawned; adjacent egg ripple fires (0 HP delta)"
      - given: "AlienPlanet destroyed"
        should: "400ms explosion animation + screen-edge flash fires; planet entity removed after tween completes"
      - given: "EnergyCrystal collected by orb"
        should: "150ms sparkle GSAP tween fires; crystal entity removed after tween completes"
    test_loci:
      - describe: "entityAnimations — GSAP tween contract"
        file: "tests/game/marsbounce/animations/entityAnimations.test.ts"
        cases:
          - "orb contacts a RockPeg"
          - "AlienEgg with hp=2 hit for first time (hp becomes 1)"
          - "AlienEgg destroyed (hp reaches 0)"
          - "AlienPlanet destroyed"
          - "EnergyCrystal collected by orb"
    files:
      animations:
        - src/game/marsbounce/animations/entityAnimations.ts
      renderer:
        - src/game/marsbounce/renderers/EntityRenderer.ts
      integration:
        - src/game/marsbounce/screens/gameController.ts
      test:
        - tests/game/marsbounce/animations/entityAnimations.test.ts
    how:
      - "entityAnimations.ts: exported GSAP tween factories (flashPeg, crackEgg, popEgg, explodePlanet, sparkCrystal); each accepts sprite and optional onComplete"
      - "Destroy order in each animation: gsap.killTweensOf(sprite) → removeAllListeners → parent.removeChild → destroy({children:true}) — enforced by guardrail rule"
      - "Reuse particleRuntime from src/core/systems/vfx/ for egg-pop particle burst; screen-flash from src/modules/primitives/screen-flash/ for planet destroy"
      - "Adjacent-egg ripple: visual-only scale tween (no ECS state change); must not modify hp or boardState"
