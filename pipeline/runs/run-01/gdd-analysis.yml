    dependencies: []
    ux:
      discovery: ~
      feedback: "Score updates visible in HUD; orb count decrements after each shot"
      onboarding: ~
    notes: >
      ECS is source of truth per ecs-state rule. SolidJS signals are DOM bridge only.
      Resources: score, orbsRemaining, orbsTotal, level, zone, boardState, starsEarned.
      Entities: RockPeg, AlienEgg (with hp, color, position), AlienPlanet (with hp,
      oscillationX, oscillationRange, speed), EnergyCrystal (position).
      Actions: launchOrb, orbHitsEgg, orbHitsPlanet, orbCollectsCrystal, orbLost,
      checkWinLose.
      Transactions: decrementOrbs, addScore, setEggHP, removePlanet, removeCrystal,
      setBoardState.
      bridgeEcsToSignals syncs score, orbsRemaining, starsEarned to SolidJS for
      Results screen (survives ECS destroy). Plugin property order enforced by ECS rule.
      No Math.random() in actions — seeded RNG passed via args.

  - id: scoring-system
    name: "Scoring System — multiplicative dimensions"
    status: new
    risk: LOW
    complexity: med
    cos_required: [scoring]
    lifecycle_phase: PLAY
    ux_zones:
      thumb_zone: ~
      touch_targets: []
      feedback_surfaces: [hud-score, results-score-counter]
    affected_files:
      - <game-root>/state/scoring.ts
    dependencies: [game-state-ecs]
    ux:
      discovery: "Score increments visible in HUD after each shot; bonus multipliers shown in results"
      feedback: >
        Crystal collect: +50 pts; peg text shows crystal count.
        Orb-remaining multiplier visible in level-complete sequence.
        Score counter ticks up (500ms GSAP ease) in win sequence.
      onboarding: "Early levels reward basic shots; ricochet bonus teaches chain-shooting"
    notes: >
      GDD-specified scoring (physics launcher / ricochet shape from scoring CoS):
        targetScore     = eggHP_destroyed * 200           (per HP point removed this shot)
        ricochetBonus   = Math.pow(1.4, ricochetCount) * 50  (geometric — 1→70, 2→98, 3→137...)
        singleShotBonus = targetsHitThisShot >= 3 ? 1000 : 0  (trickshot)
        crystalBonus    = crystalsCollected * 50
        remainingOrbMul = 1 + orbsRemaining * 0.25
        levelScore      = (targetScore + ricochetBonus + singleShotBonus + crystalBonus) * remainingOrbMul
      Wide range ensures leaderboard striation (scoring CoS). Pure function, no Pixi imports.
      Star rating: 1 star = any clear; 2 stars = ≥50% orbs remaining; 3 stars = ≥75% remaining.
      Star thresholds not specified in GDD — flagged as open question OQ-001.

  - id: level-generator
    name: "Level Generator — seeded procedural + hand-crafted loader"
    status: new
    risk: MEDIUM
    complexity: high
    cos_required: [core-interaction]
    lifecycle_phase: PLAY
    ux_zones:
      thumb_zone: ~
      touch_targets: []
      feedback_surfaces: []
    affected_files:
      - <game-root>/levels/levelGenerator.ts
      - <game-root>/levels/levelLoader.ts
      - <game-root>/levels/solvabilityChecker.ts
      - <game-root>/levels/difficultyParams.ts
      - <game-root>/levels/seededRng.ts
    dependencies: [game-state-ecs, level-data-scaffold]
    ux:
      discovery: ~
      feedback: ~
      onboarding: >
        Levels 1-5: green eggs only, no Alien Planets, 4-6 eggs, 8-10 orbs.
        Levels 6-10: introduce purple eggs and optional Alien Planet.
        Post-tutorial (11-20): effortless — challenge earned from level 21.
    notes: >
      Seed formula: levelNumber × 48271 + 9973. No Math.random() — fully seeded.
      Solvability: 500 simulated trajectories; max 10 retry attempts (seed + attempt*7919).
      Fallback pool: 20 hand-crafted layouts indexed by levelNumber mod 20; loaded at
      game start and cached; last-resort fallback to level-001 with Sentry error.
      Rejection conditions: occluded egg, min-orbs-exceeded, overlap, < 2 pegs in corridor.
      seededRng.ts must be a pure function module (no global state, no Math.random).
      Difficulty curve table in GDD must be encoded in difficultyParams.ts.
      Orange eggs not permitted before level 20.

  - id: board-state-machine
    name: "Board State Machine — idle/aiming/animating/resolving/won/lost/paused"
