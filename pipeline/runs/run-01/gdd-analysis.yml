    dependencies: [game-state-ecs, orb-launcher, physics-engine]
    ux:
      discovery: ~
      feedback: >
        State transitions are animated (no instant changes).
        Input blocked in animating/resolving/won/lost states.
        Tap during flight: silently ignored per GDD.
      onboarding: ~
    notes: >
      States: idle → aiming → animating → resolving → won | lost.
      Paused is an overlay mode; board state preserved.
      Resolving state: check win/lose after orb resolves.
      Won state: triggers win sequence, then navigates to results.
      Lost state: triggers loss sequence, then navigates to results.
      Any transition that changes visible entities must be animated (per animated-dynamics CoS).

