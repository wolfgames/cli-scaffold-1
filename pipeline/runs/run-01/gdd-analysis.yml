conflicts: []
  # No conflict features — game is fully greenfield (game_greenfield: true from prime).
  # All existing features are scaffold infrastructure with no gameplay content to conflict.

risk_areas:
  - feature: game-screen-shell
    reason: >
      Central GameController integration point. Converting from DOM stub to Pixi mode
      wires ECS, physics engine, all renderers, and input in one place. Touches
      viewport layout (HUD top reservation, launcher bottom reservation, play area bounds).
      Failure here breaks all PLAY-phase features.

  - feature: orb-launcher
    reason: >
      Primary interaction + trajectory preview + input state machine must all be
      correct simultaneously. Drag-aim-release archetype is non-standard (not Swap/Tap);
      requires custom pointer event handling. Viewport positioning (bottom-center, natural
      thumb zone) interacts with WolfGames logo reservation (64px bottom).

open_questions:
  - id: OQ-001
    question: "What are the exact star rating thresholds (orbs remaining for 2-star and 3-star)?"
    context: >
      GDD says '1-3 stars based on orbs remaining at level clear' but gives no thresholds.
      Star rating affects replay motivation and scoring CoS (starsEarned signal).
      Suggested defaults: 1 star = any clear; 2 stars = ≥40% orbs remaining;
      3 stars = ≥66% orbs remaining — should be configurable in tuning.

  - id: OQ-002
    question: "What is the levels-per-zone (chapter) count for the PROGRESSION boundary trigger?"
    context: >
      GDD mentions '4+ zones at launch' and '10 hand-crafted levels' for early play.
      lifecycle.md default is ZONE_SIZE=20. GDD implies chapter ≈ 10 levels (levels 1-10
      = tutorial, then new zone). Confirm zone size for chapter-interstitial trigger logic.

  - id: OQ-003
    question: "Which ad network/SDK is used for the continue (watch-ad-for-3-orbs) system?"
    context: >
      GDD specifies the UX (non-intrusive, 1s delay, 3 bonus orbs) but not the ad integration.
      Without this, continue-ad-system can only be stubbed. Pipeline can build the UX shell;
      ad network wiring deferred to a separate pass or integration sprint.

  - id: OQ-004
    question: "What is the visual style / art direction for entity sprites (pixel art, vector, painted)?"
    context: >
      GDD describes entity sizes and colors but not art style. 'Lumpy ovoid', 'rough orange-red
      basalt column', 'alien purples and teals' are described. Art style determines spritesheet
      generation approach and whether canvas CoS passes at a glance test.
      Canvas CoS requires entities distinguishable at mobile resolution beyond color alone.
