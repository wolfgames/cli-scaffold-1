      - <game-root>/renderers/EntityRenderer.ts
    dependencies: [physics-engine, game-state-ecs]
    ux:
      discovery: >
        Rock pegs: orange-red basalt columns, visually distinct.
        Alien eggs: colored lumpy ovals (green/purple/orange) with bioluminescent spots.
        Alien planet: ringed planet in alien purples/teals with slow wobble.
        Energy crystal: bright cyan hexagonal, spinning slowly.
      feedback: >
        Rock peg: orange flash 300ms on orb contact.
        Alien egg: crack sprite on 2nd hit (purple/orange); 200ms pop on destroy;
        adjacent eggs ripple (visual-only shockwave, 0 HP).
        Alien planet: 400ms explosion + screen-edge light flash on destroy; wobble pauses during orb flight.
        Energy crystal: 150ms sparkle on collect; +50 pts + 1 bonus orb.
      onboarding: "Color-coding teaches HP at a glance; crack sprite signals damage; colors are multi-cue (color + shape)"
    notes: >
      Visual distinctiveness required (canvas CoS): every entity type must be
      distinguishable at a glance at mobile resolution. Green/purple/orange eggs must
      be distinguishable by more than color alone (shape, pattern, spots) per
      colorblind accessibility rule (never color alone). Alien Planet oscillation pauses
      while orb in flight. Crystal max 5 bonus orbs per level. Each entity needs
      stable identity for animation system (animated-dynamics CoS).

  - id: game-state-ecs
    name: "Game State — ECS plugin"
    status: new
    risk: MEDIUM
    complexity: med
    cos_required: [scoring]
    lifecycle_phase: PLAY
    ux_zones:
      thumb_zone: ~
      touch_targets: []
      feedback_surfaces: [hud-orb-count, hud-score, hud-level]
