    ux:
      discovery: "Physics is visible through orb trajectory and bounce responses"
      feedback: "Orb has swirling energy trail; peg flashes orange 300ms on contact"
      onboarding: "Trajectory preview teaches reflection before first launch"
    notes: >
      Pure logic module (no Pixi imports in step/physics functions — ECS purity rule).
      Gravity: ~0.3 m/s² equivalent downward curve.
      Reflection: angle of incidence = angle of reflection off pegs/walls/planets.
      Bounce limit: 20 bounces without hitting egg/crystal → orb removed.
      Trajectory preview: raycasting simulation for first 3-4 reflections.
      Seeded RNG not needed here (deterministic physics from position+velocity).

