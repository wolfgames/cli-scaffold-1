      - <game-root>/input/LauncherInput.ts
      - <game-root>/interaction-archetype.md
    dependencies: [game-state-ecs, physics-engine]
    ux:
      discovery: "Launcher at bottom-center with drag handle; trajectory dotted line appears on drag"
      feedback: >
        Dotted trajectory preview shows first 3-4 reflections while dragging.
        Downward-aim drag cancelled silently (no orb fired, no feedback needed per GDD).
        Input blocked while orb is in flight (animating state).
        Tap during flight: ignored (no shake/reject — just silent block per GDD).
      onboarding: "Level 1 layout designed so first natural drag angle hits an egg; aha moment built into terrain"
    notes: >
      Interaction archetype: Drag-aim-release (not standard Swap or Tap).
      Minimum hit area 44×44 pt on launcher handle. Launcher at bottom 40% center column
      (natural thumb zone). Drag up and left/right to aim. Release fires orb.
      Only one orb in flight at a time. Per core-interaction CoS: must document
      interaction archetype in interaction-archetype.md before implementing.
      HIGH risk: central GameController integration point + viewport layout.

  - id: physics-engine
